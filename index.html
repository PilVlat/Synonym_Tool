<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY OWN WEBPAGE</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <header class="flex flex-col justify-center font-bold items-center bg-gradient-to-br from-sky-600 to-sky-100 pt-4 pb-2">
        <h1 class="tracking-widest bg-black/30 text-white text-6xl rounded-xl p-5 shadow-xl">VOCABULARY IMPROVER</h1>
        <h3 class="text-xs font-serif pt-2 font-thin italic text-gray-800 ">A tool crafted to perfection</h3>
    </header>
    <div class="bg-gray-200">
        <div class="flex justify-start pl-10 p-5"id="problematic-word">
            <h4 class="bg-white px-5 rounded-xl shadow-xl text-lg">❓Problematic word❓ :<input class="caret-transparent bg-gray-300/70 m-5 p-2 rounded-xl shadow-xl focus:bg-gray-300/100 text-gray-800 focus:text-black outline-none" id="input-word" spellcheck="false" type="text" placeholder="Enter your word here"></h4>
            <!-- <select id="dropdown" style="width: 300px;">
                <option value="Option 1">Option 1</option>
                <option value="Option 2">Option 2</option>
                <option value="Option 3">Option 3</option>
            </select>     -->
        </div>
        

        <main class="h-80vh">
            <div id="left-side">
                <textarea class="bg-gray-700 text-white rounded-xl p-5" required wrap="hard" spellcheck="false" id="text" name="text" rows="1000" cols="130" placeholder="Type options here..."> HELLO </textarea>
            </div>
            <div id="right-side">
                <div class="flex flex-col" id="graph-div">
                    <div class="basis-2">
                        <img class="object-contain" src="Refresh.png"></img>
                    </div>
                    <div class="basis-32">

                    </div>
                </div>
                <div id="sentences-highlighted">
                    <p>right side sentences</p>
                </div>
            </div>
        </main>
    </div>

    <footer id="footer">
        <p>&copy; 2024 My Website</p>
    </footer>
    <script src="script.js" defer></script>
</body>
</html>
