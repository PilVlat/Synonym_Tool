<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY OWN WEBPAGE</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div id="alternatives_window" class="fixed bg-slate-400/80 top-[10vh] left-[10vw] h-[80vh] w-[80vw] z-20 invisible">
        <button class="flex justify-self-end px-1" id="close_alternatives" onclick="close_alternatives()">X</button>
        <div class="h-full w-full flex justify-center items-center">
            <div class="w-[30%] h-[100%]">
                <input type="range" id="similarity_slider" onchange="display_alternatives()">
                <input type="range" id="grammatical_slider" onchange="display_alternatives()">
                <input type="range" id="rare_slider" onchange="display_alternatives()">
            </div>
            <div class="w-[60%] h-[90%] top-0 overflow-auto overscroll-contain">
                <table class="w-full text-white h-full bg-gray-500 table-auto rounded-xl">
                    <thead class="sticky top-0 z-10 bg-gray-600">
                        <th class="p-2">Word</th>
                        <th class="p-2">Score</th>
                    </thead>
                    <tbody id="table_alternatives">

                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <header class="flex flex-col justify-center font-bold items-center bg-gradient-to-br from-sky-600 to-sky-100 pt-4 pb-2">
        <h1 class="tracking-widest bg-black/30 text-white text-6xl rounded-xl p-5 shadow-xl">VOCABULARY IMPROVER</h1>
        <h3 class="text-xs font-serif pt-2 font-thin italic text-gray-800 ">A tool crafted to perfection</h3>
    </header>
    <div class="bg-gray-200">
        <div class="flex justify-start pl-10 p-5"id="problematic-word">
            <h4 class="bg-white px-5 rounded-xl shadow-xl text-lg">❓Problematic word❓ :<input class="caret-transparent bg-gray-300/70 m-5 p-2 rounded-xl shadow-xl focus:bg-gray-300/100 text-gray-800 focus:text-black outline-none" id="input-word" spellcheck="false" type="text" placeholder="Enter your word here" onchange="find_sentences()"></h4>
        </div>
        

        <main class="flex h-[80vh]">
            <div class="w-7/10 h-[100%] object-contain p-5" id="left-side">
                <textarea class="bg-gray-700 h-[95%] w-full text-white rounded-xl p-5" required wrap="hard" spellcheck="false" id="text" name="text" rows="1000" cols="130" placeholder="Type options here..."> HELLO </textarea>
            </div>
            <div class="w-3/10 o-5" id="right-side">
                <div class="h-4/10 w-full flex flex-col" id="graph-div">
                    <div class="flex items-center justify-center h-3/10 p-5">
                        <img id="refresh" class="h-full bg-gradient-to-bl from-amber-400 to-violet-400 rounded-xl p-1 cursor-pointer shadow-xl hover:h-11/10 transition-all duration-300" src="Refresh.png" onclick="table()"></img>
                    </div>
                    <div class="h-7/10 p-1">
                        <div class="h-full overflow-auto overscroll-contain">
                            <table class="w-full text-white h-full bg-gray-500 table-auto rounded-xl">
                                <thead class="sticky top-0 z-10 bg-gray-600">
                                    <th class="p-2">Occurences in text</th>
                                    <th class="p-2">Occurences in litterature</th>
                                    <th class="p-2">Word</th>
                                </thead>
                                <tbody id="table">
                                    
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="bg-blue-100 h-5/10 mx-5 rounded-xl my-3">
                    <p class="font-bold text-gray-800 text-center h-1/10">Sentences containing the word</p>
                    <div id="sentences-highlighted"></div>
                </div>
            </div>
        </main>
    </div>

    <footer id="footer">
        <p>&copy; 2024 My Website</p>
    </footer>
    <script src="script.js" defer></script>
</body>
</html>
